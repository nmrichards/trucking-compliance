# Root railway.toml — applies to the backend (API) service.
# In the Railway dashboard, point the API service root to: /
# and the frontend service root to: /frontend

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "backend/Dockerfile"

[deploy]
  healthcheckPath = "/health"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
